# docker-compose.yml
services:
  # ─── Databases ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: shop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_pass
      POSTGRES_DB: shop_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shop_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7-jammy
    container_name: shop_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: shop_logs
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/shop_logs --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shop_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: shop_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Prisma migrations ───────────────────────────────────────────────────────

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shop_migrate
    command: >
      sh -c "npx prisma migrate deploy && node src/config/seed.js"
    environment:
      DATABASE_URL: postgresql://shop_user:shop_pass@postgres:5432/shop_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Backend instances ───────────────────────────────────────────────────────

  backend1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shop_backend1
    restart: unless-stopped
    environment: &backend_env
      DATABASE_URL: postgresql://shop_user:shop_pass@postgres:5432/shop_db
      MONGODB_URI: mongodb://mongo:27017/shop_logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: change_me_in_production_jwt_secret
      JWT_REFRESH_SECRET: change_me_in_production_refresh_secret
      FRONTEND_URL: http://localhost
      PORT: 3001
      INSTANCE_ID: "1"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }

  backend2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shop_backend2
    restart: unless-stopped
    environment:
      <<: *backend_env
      PORT: 3002
      INSTANCE_ID: "2"
    ports:
      - "3002:3002"
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }

  backend3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shop_backend3
    restart: unless-stopped
    environment:
      <<: *backend_env
      PORT: 3003
      INSTANCE_ID: "3"
    ports:
      - "3003:3003"
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }

  # ─── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shop_frontend
    restart: unless-stopped
    depends_on:
      - backend1

  # ─── Nginx reverse proxy ─────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: shop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
